<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Claude Code - Login</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #1e1e1e;
    color: #d4d4d4;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .login-box {
    background: #2d2d2d;
    border: 1px solid #404040;
    border-radius: 8px;
    padding: 40px;
    width: 360px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.4);
  }
  .logo {
    text-align: center;
    margin-bottom: 24px;
  }
  .logo svg {
    width: 48px;
    height: 48px;
    fill: #d4856a;
  }
  .logo h1 {
    font-size: 20px;
    font-weight: 600;
    margin-top: 12px;
    color: #e0e0e0;
  }
  .logo p {
    font-size: 13px;
    color: #888;
    margin-top: 4px;
  }
  label {
    display: block;
    font-size: 13px;
    color: #999;
    margin-bottom: 6px;
  }
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    background: #1e1e1e;
    border: 1px solid #404040;
    border-radius: 4px;
    color: #d4d4d4;
    font-size: 14px;
    outline: none;
    transition: border-color 0.2s;
  }
  input[type="password"]:focus {
    border-color: #d4856a;
  }
  button {
    width: 100%;
    padding: 10px;
    margin-top: 16px;
    background: #d4856a;
    color: #1e1e1e;
    border: none;
    border-radius: 4px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s;
  }
  button:hover { background: #e0956f; }
  button:disabled { background: #666; cursor: wait; }
  .error {
    color: #f44;
    font-size: 13px;
    margin-top: 12px;
    text-align: center;
    display: none;
  }
</style>
</head>
<body>
  <div class="login-box">
    <div class="logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M4 17.3V5c0-1.1.9-2 2-2h12c1.1 0 2 .9 2 2v10c0 1.1-.9 2-2 2H7.7L4 17.3zM7 7h10v1.5H7V7zm0 3h7v1.5H7V10z"/></svg>
      <h1>Claude Code</h1>
      <p>Web Terminal</p>
    </div>
    <form id="login-form">
      <label for="password">Password</label>
      <input type="password" id="password" name="password" autocomplete="current-password" autofocus>
      <button type="submit" id="btn">Sign in</button>
      <div class="error" id="error">Incorrect password</div>
    </form>
  </div>
<script>
document.getElementById('login-form').addEventListener('submit', function(e) {
  e.preventDefault();
  var pw = document.getElementById('password').value;
  var btn = document.getElementById('btn');
  var err = document.getElementById('error');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Signing in\u2026';

  fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ password: pw })
  }).then(function(res) {
    if (res.ok) {
      window.location = '/';
    } else {
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Sign in';
    }
  }).catch(function() {
    err.textContent = 'Connection error';
    err.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Sign in';
  });
});
</script>
</body>
</html>
